name: Build

on:
  push:
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - name: linux-x86_64
            runs-on: ubuntu-22.04
            arch: amd64
          - name: linux-aarch64
            runs-on: ubuntu-24.04-arm
            arch: arm64
    runs-on: ${{ matrix.runs-on }}

    steps:
      - uses: actions/checkout@v4

      - name: Build inside Docker (glibc 2.28)
        run: |
          docker build --platform linux/${{ matrix.arch }} -t funasr-builder .
          docker create --name funasr-tmp funasr-builder
          docker cp funasr-tmp:/build/dist/main ./main-${{ matrix.name }}
          docker rm funasr-tmp

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: main-${{ matrix.name }}
