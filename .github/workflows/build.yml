name: Build

on:
  push:
  workflow_dispatch:

jobs:
  linux:
    strategy:
      matrix:
        include:
          - name: linux-x86_64
            runs-on: ubuntu-22.04
            arch: amd64
          - name: linux-aarch64
            runs-on: ubuntu-24.04-arm
            arch: arm64
    runs-on: ${{ matrix.runs-on }}

    steps:
      - uses: actions/checkout@v4

      - name: Build inside Docker (glibc 2.28)
        run: |
          docker build --platform linux/${{ matrix.arch }} -t funasr-builder .
          docker create --name funasr-tmp funasr-builder
          docker cp funasr-tmp:/build/dist/funasr ./funasr-${{ matrix.name }}
          docker rm funasr-tmp

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: funasr-${{ matrix.name }}

  windows:
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          pip install torch torchaudio --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt pyinstaller

      - name: Build with PyInstaller
        run: |
          pyinstaller --onefile --name funasr --collect-all torch --collect-all torchaudio --hidden-import=funasr_onnx --hidden-import=funasr --hidden-import=librosa --hidden-import=soundfile main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-x86_64
          path: dist/funasr.exe

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [linux, windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Rename binaries
        run: |
          mkdir release
          cp dist/linux-x86_64/funasr-linux-x86_64 release/
          cp dist/linux-aarch64/funasr-linux-aarch64 release/
          cp dist/windows-x86_64/funasr.exe release/funasr-windows-x86_64.exe

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body: |
            ## 二进制文件

            | 平台 | 文件 |
            |------|------|
            | Linux x86_64 | `funasr-linux-x86_64` |
            | Linux aarch64 | `funasr-linux-aarch64` |
            | Windows x86_64 | `funasr-windows-x86_64.exe` |

            需要 glibc ≥ 2.28。
          files: release/*
