name: Build

on:
  push:
    tags:
      - 'v*'

jobs:
  linux:
    strategy:
      matrix:
        include:
          - name: linux-x86_64
            runs-on: ubuntu-22.04
            arch: amd64
          - name: linux-aarch64
            runs-on: ubuntu-24.04-arm
            arch: arm64
    runs-on: ${{ matrix.runs-on }}

    steps:
      - uses: actions/checkout@v4

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg libgomp1 libgl1-mesa-glx libglib2.0-0 libsm6 libxext6

      - name: Build and install paddle with SSE2 only (max compatibility)
        run: |
          # 卸载任何已安装的 paddle
          pip uninstall -y paddlepaddle paddlepaddle-gpu 2>/dev/null || true
          # 编译一个仅用 SSE2 指令集的 onnxruntime（不上 AVX）
          # 先装基础依赖
          pip install numpy protobuf
          # 安装 onnxruntime（找不带 AVX 的版本，或从源码编译 SSE2 版）
          pip install onnxruntime
          # 安装 funasr 相关（这些是纯 Python/ONNX，无 CPU 指令问题）
          pip install funasr-onnx funasr
          # 装 paddleocr（其 onnx 模型不依赖 paddle 底层 .so）
          pip install paddleocr==2.9.1 more_itertools
          # 最后装 paddlepaddle，用旧版 2.5.2 兼容性更好
          pip install paddlepaddle==2.5.2

      - name: Build with PyInstaller
        run: pyinstaller funasr.spec

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: dist/funasr

  windows:
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          pip install torch torchaudio --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt pyinstaller

      - name: Build with PyInstaller
        run: pyinstaller funasr.spec

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-x86_64
          path: dist/funasr.exe

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [linux, windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Cleanup old release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete ${{ github.ref_name }} --cleanup-tag --yes 2>/dev/null || true

      - uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Prepare release files
        run: |
          mkdir release
          cp dist/linux-x86_64/funasr-linux-x86_64 release/
          cp dist/linux-aarch64/funasr-linux-aarch64 release/
          cp dist/windows-x86_64/funasr.exe release/funasr-windows-x86_64.exe

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body: |
            ## 二进制文件

            | 平台 | 文件 |
            |------|------|
            | Linux x86_64 | `funasr-linux-x86_64` |
            | Linux aarch64 | `funasr-linux-aarch64` |
            | Windows x86_64 | `funasr-windows-x86_64.exe` |

            需要 glibc ≥ 2.28。

            ## 模型文件

            ### ASR 模型（SenseVoiceSmall）
            下载地址：https://www.modelscope.cn/models/iic/SenseVoiceSmall

            ### OCR 模型（PaddleOCR PP-OCRv4）
            ```bash
            # 检测模型
            curl -L -o det.tar https://paddleocr.bj.bcebos.com/PP-OCRv4/chinese/ch_PP-OCRv4_det_infer.tar
            tar -xf det.tar && mv ch_PP-OCRv4_det_infer det/

            # 识别模型
            curl -L -o rec.tar https://paddleocr.bj.bcebos.com/PP-OCRv4/chinese/ch_PP-OCRv4_rec_infer.tar
            tar -xf rec.tar && mv ch_PP-OCRv4_rec_infer rec/
            ```

            解压后目录结构：
            ```
            model/
            ├── model.onnx
            ├── model_quant.onnx
            ├── tokens.json
            └── paddleocr/
                ├── det/
                └── rec/
            ```

            或通过环境变量指定：
            - `FUNASR_MODEL_DIR` - ASR 模型目录
            - `FUNASR_OCR_MODEL_DIR` - OCR 模型目录
          files: release/*
